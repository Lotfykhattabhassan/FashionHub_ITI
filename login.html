<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<title>Login</title>
</head>

<body class="flex items-center justify-center h-screen bg-gradient-to-r from-gray-900 via-gray-700 to-slate-500 text-white">
<form class="max-w-md w-full p-6 shadow-[0_35px_35px_rgba(0,0,0,0.5)] rounded-md" onsubmit="login(event)">

<h1 class="text-2xl font-bold mb-6">Sign In</h1>

<input id="email" type="email" value="test@test.com" placeholder="Email" required
class="w-full p-3 mb-4 border rounded-md outline-none" />

<input id="password" type="password" value="123456" placeholder="Password" required
class="w-full p-3 mb-4 border rounded-md outline-none" />

<button type="submit" class="w-full py-3 bg-slate-500 hover:bg-slate-600 cursor-pointer text-white rounded-md">Sign In</button>

<p id="error" class="text-red-500 text-sm mt-3"></p>

<p class="mt-3 text-sm">Don't have an account?
<a href="register.html" class="text-blue-600">Register here</a></p>

</form>

<script>

if (!localStorage.getItem("users")) {
    localStorage.setItem("users", JSON.stringify([
        { email: "test@test.com", password: "123456" }
    ]));
}

function login(e) {
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let error = document.getElementById("error");

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.email === email && u.password === password);

    if (user) {
        localStorage.setItem("currentUser", JSON.stringify(user));

        window.location.href = "product.html";
    } else {
        error.innerText = "Email or Password not correct";
    }
}

</script>

</body>
</html>
