<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-gray-900 via-gray-700 to-slate-500"> 
  <div class=" text-white min-h-screen">
    <div class="max-w-7xl max-lg:max-w-3xl mx-auto p-6">
      
      <h2 class="text-2xl font-semibold text-white">Your shopping bag</h2>

      <div class="grid lg:grid-cols-3 gap-6 relative mt-6">

        <div id="cart-items" class="lg:col-span-2 space-y-6"></div>

        <div class="bg-white h-max p-4 shadow-sm border border-gray-200 sticky top-0">
          <h3 class="text-base font-semibold text-slate-900">Order Summary</h3>

          <ul class="text-slate-500 font-medium text-sm space-y-3 mt-4">
            <li class="flex flex-wrap gap-4">
              Subtotal 
              <span id="subtotal" class="ml-auto font-semibold text-slate-900">$0</span>
            </li>

            <li class="flex flex-wrap gap-4">
              Shipping 
              <span class="ml-auto font-semibold text-slate-900">Free</span>
            </li>

            <li class="flex flex-wrap gap-4">
              Tax 
              <span id="tax" class="ml-auto font-semibold text-slate-900">$0</span>
            </li>

            <li class="flex flex-wrap gap-4 font-semibold text-slate-900 border-t pt-3">
              Total 
              <span id="total" class="ml-auto">$0</span>
            </li>
          </ul>

            <button onclick="checkout()"
                class="mt-6 text-sm font-medium px-4 py-2.5 w-full bg-gray-700 hover:bg-gray-800 cursor-pointer text-white">
                Proceed to Checkout
            </button>
        </div>

      </div>
    </div>
  </div>
  <footer class="bg-gradient-to-r my-8 from-gray-900 via-gray-900 to-slate-600 text-gray-400 py-10 text-center">
  <p>© 2026 FashionHub. All rights reserved.</p>
    </footer>
  <script>
const cartContainer = document.getElementById("cart-items");

let currentUser = JSON.parse(localStorage.getItem("currentUser"));
if (!currentUser) {
  alert("You must login first!");
  window.location.href = "login.html";
}
let userEmail = currentUser.email;
let cartKey = `cart_${userEmail}`;

function displayCart() {
  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

  if (cart.length === 0) {
    cartContainer.innerHTML = "<h2 class='text-xl font-semibold'>Cart is empty</h2>";
    updateSummary();
    return;
  }

  cartContainer.innerHTML = cart.map(item => `
    <div class="p-2 bg-white shadow-sm border border-gray-200">
      <div class="grid sm:grid-cols-2 items-center gap-4">

        <div class="bg-gradient-to-bl from-gray-200 via-gray-50 to-gray-100 flex items-center justify-center p-4">
          <img src="${item.thumbnail}" class="w-56 object-contain" />
        </div>

        <div class="p-2">
          <h3 class="text-base font-semibold text-slate-900">${item.title}</h3>

          <p class="text-sm text-slate-500 mt-2">
            ${item.description ? item.description.slice(0, 80) : ''}...
          </p>

          <div class="flex items-center justify-between flex-wrap gap-4 mt-6">

            <div class="flex items-center gap-3">
              <h4 class="text-sm font-medium">Qty:</h4>

              <div class="flex gap-2 items-center border px-3 py-1.5">
                <button onclick="decrease(${item.id})">-</button>
                <span class="px-2">${item.quantity}</span>
                <button onclick="increase(${item.id})">+</button>
              </div>
            </div>

            <div>
              <h4 class="text-lg font-bold text-blue-600">
                $${item.price * item.quantity}
              </h4>
            </div>

          </div>

          <div class="mt-6 border-t text-center">
            <button onclick="removeItem(${item.id})"
              class="py-3 w-full text-sm text-red-500 hover:bg-gray-100">
              Remove
            </button>
          </div>

        </div>
      </div>
    </div>
  `).join("");

  updateSummary();
}

function increase(id) {
  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  cart.forEach(item => {
    if (item.id === id) item.quantity++;
  });
  localStorage.setItem(cartKey, JSON.stringify(cart));
  displayCart();
}

function decrease(id) {
  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  cart.forEach(item => {
    if (item.id === id && item.quantity > 1) item.quantity--;
  });
  localStorage.setItem(cartKey, JSON.stringify(cart));
  displayCart();
}

function removeItem(id) {
  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  cart = cart.filter(item => item.id !== id);
  localStorage.setItem(cartKey, JSON.stringify(cart));
  displayCart();
}

function updateSummary() {
  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  let subtotal = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
  let tax = Math.round(subtotal * 0.05);
  let total = subtotal + tax;

  document.getElementById("subtotal").innerText = "$" + subtotal;
  document.getElementById("tax").innerText = "$" + tax;
  document.getElementById("total").innerText = "$" + total;
}

function checkout() {
  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  let confirmOrder = confirm("Are you sure you want to complete the purchase?");

  if (confirmOrder) {
    localStorage.removeItem(cartKey);

    alert("Purchase completed successfully!");

    displayCart();
  }
}

displayCart();
</script>

</body>
</html>
